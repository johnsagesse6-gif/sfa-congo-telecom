<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
    <div th:replace="~{fragments/layout :: sidebar(currentPage='index')}"></div>
    
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold" style="color: var(--ct-blue-dark);">Tableau de Bord</h2>
            <div class="text-end">
                <span class="badge bg-dark">Congo Telecom SFA</span>
                <div class="small text-muted" th:text="${#dates.format(#dates.createNow(), 'dd MMMM yyyy')}"></div>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-check-circle me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card card-custom p-4 bg-white border-start border-primary border-5 shadow-sm">
                    <h6 class="text-muted text-uppercase small fw-bold">Total Factures</h6>
                    <h2 class="fw-bold mb-0" th:text="${totalFactures}">0</h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-custom p-4 bg-white border-start border-success border-5 shadow-sm">
                    <h6 class="text-muted text-uppercase small fw-bold">Chiffre d'Affaires</h6>
                    <h2 class="fw-bold mb-0">
                        <span th:text="${#numbers.formatDecimal(totalCA, 0, 'WHITESPACE', 0, 'POINT')}">0</span>
                        <small class="fs-6">FCFA</small>
                    </h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-custom p-4 bg-white border-start border-warning border-5 shadow-sm">
                    <h6 class="text-muted text-uppercase small fw-bold">Clients Actifs</h6>
                    <h2 class="fw-bold mb-0" th:text="${totalClients}">0</h2>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card card-custom p-4 shadow-sm text-center">
                    <h5 class="mb-3">Actions Rapides</h5>
                    <div class="d-flex justify-content-center gap-3">
                        <a th:href="@{/factures/creer}" class="btn btn-primary" style="background-color: var(--ct-blue);">+ Nouvelle Facture</a>
                        <a th:href="@{/clients}" class="btn btn-outline-primary">Gérer les Clients</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
