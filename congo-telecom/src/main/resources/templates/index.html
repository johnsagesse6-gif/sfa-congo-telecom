<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SFA Congo Telecom - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background-color: #004a99; font-weight: bold; }
        .card { border: none; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .btn-telecom { background-color: #004a99; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">SFA CONGO TELECOM</a>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center">
                        <div class="mb-3 text-primary"><i class="bi bi-box-seam fs-1"></i></div>
                        <h3>Articles</h3>
                        <p class="text-muted">Gérer le catalogue des services et produits.</p>
                        <a th:href="@{/articles}" class="btn btn-primary px-4">Voir les articles</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center">
                        <div class="mb-3 text-success"><i class="bi bi-people fs-1"></i></div>
                        <h3>Clients</h3>
                        <p class="text-muted">Liste et gestion des clients Congo Telecom.</p>
                        <a th:href="@{/clients}" class="btn btn-success px-4">Gérer les clients</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100 border-warning">
                    <div class="card-body text-center">
                        <div class="mb-3 text-warning"><i class="bi bi-file-earmark-pdf fs-1"></i></div>
                        <h3>Factures</h3>
                        <p class="text-muted">Générer de nouvelles factures et exporter en PDF.</p>
                        <a th:href="@{/factures/creer}" class="btn btn-warning px-4 fw-bold">Nouvelle Facture</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
